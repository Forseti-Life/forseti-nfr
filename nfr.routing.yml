# Public Pages
# Note: Most public content pages should be created as Drupal Basic Page nodes
# and accessed via their aliases (e.g., /nfr/about, /nfr/how-it-works, etc.)
# Use Path module to set URL aliases like /nfr/about
# Only custom functionality pages need custom routes below:

nfr.faq:
  path: '/nfr/faq'
